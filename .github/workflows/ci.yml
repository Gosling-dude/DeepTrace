name: DeepTrace CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'
          cache-dependency-path: 'src/backend/requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/backend/requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          # stop the build if there are Python syntax errors or undefined names
          flake8 src/backend --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings
          flake8 src/backend --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

      - name: Run Backend Pytest
        env:
          APP_ENV: test
          DATABASE_URL: "sqlite:///:memory:"
          FALLBACK_TO_MOCK_MODEL: "True"
          JWT_SECRET_KEY: ci-test-secret-key
        run: |
          pytest src/backend/tests/ -v

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: 'npm'
          cache-dependency-path: 'src/frontend/app/package-lock.json'

      - name: Install dependencies
        working-directory: src/frontend/app
        run: npm ci

      - name: Type Check (TypeScript)
        working-directory: src/frontend/app
        run: npx tsc --noEmit

      - name: Build Validation
        working-directory: src/frontend/app
        run: npm run build
